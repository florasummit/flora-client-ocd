name: Validate and Build OCD Package

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Choose draft while completing the package; choose final only when all REQUIRED fields are completed."
        required: true
        default: "draft"
        type: choice
        options:
          - draft
          - final
  push:
    paths:
      - "client.yml"
      - "00-admin/**"
      - "01-intake/**"
      - "02-ownership/**"
      - "03-brand-assets/**"
      - "04-licensing/**"
      - "05-flora-summit/**"
      - "06-closing/**"
      - "07-trademark/**"
      - "scripts/**"
      - ".github/workflows/validate-and-build.yml"

permissions:
  contents: read

jobs:
  build-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Report unresolved draft fields
        if: github.event_name == 'push' || inputs.build_mode == 'draft'
        continue-on-error: true
        run: python scripts/validate.py

      - name: Require completed fields for final build
        if: github.event_name == 'workflow_dispatch' && inputs.build_mode == 'final'
        run: python scripts/validate.py

      - name: Build package
        run: python scripts/build.py

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OCD-${{ github.event_name == 'workflow_dispatch' && inputs.build_mode || 'draft' }}-signing-package
          if-no-files-found: error
          path: |
            09-generated/OCD-Brand-Foundation-and-Flora-Summit-Partnership-Package.md
            09-generated/OCD-Brand-Foundation-and-Flora-Summit-Partnership-Package.docx
            09-generated/OCD-Brand-Foundation-and-Flora-Summit-Partnership-Package.pdf
            09-generated/SHA256SUMS.txt
